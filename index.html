<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#fff7ed"><link rel="manifest" href="manifest.webmanifest"><title>오늘한입</title><style>
:root{--ink:#18322b;--muted:#718078;--green:#1d7a5a;--lime:#b8e36b;--cream:#fffaf1;--card:#fff;--line:#e5e9e4;--warn:#a94b2c}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif}header{position:sticky;top:0;z-index:5;background:#fffaf1e8;backdrop-filter:blur(12px);padding:16px max(18px,calc((100% - 680px)/2));display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee7dc}h1{font-size:22px;margin:0}h2{font-size:19px;margin:0 0 14px}.date{border:0;background:white;padding:10px;border-radius:12px;color:var(--ink)}main{max-width:680px;margin:auto;padding:18px 16px 100px}.hero{background:var(--ink);color:#fff;border-radius:26px;padding:22px;margin-bottom:16px}.hero small{color:#c9d8d1}.big{font-size:38px;font-weight:800;margin:6px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#ffffff16;padding:12px;border-radius:15px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;margin:12px 0;box-shadow:0 7px 22px #344b3f0b}.quick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick button{min-height:78px;font-size:16px;text-align:left}.quick b{display:block;font-size:22px}.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.between{justify-content:space-between}.muted{color:var(--muted);font-size:13px}.progress{height:9px;border-radius:20px;background:#edf0eb;overflow:hidden;margin:7px 0}.progress i{display:block;height:100%;background:var(--lime);border-radius:20px}button,.btn{border:0;border-radius:14px;padding:12px 15px;background:#edf3ef;color:var(--ink);font-weight:700;cursor:pointer}.primary{background:var(--green);color:#fff}.danger{color:var(--warn);background:#fff2ed}.full{width:100%}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px;font:inherit;color:var(--ink)}label{font-size:13px;color:var(--muted);display:block;margin:10px 0 5px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}.chips{display:flex;gap:7px;overflow:auto;padding:2px 0 8px}.chip{white-space:nowrap;padding:9px 12px}.chip.on{background:var(--ink);color:#fff}.item{padding:12px 0;border-top:1px solid var(--line)}.item:first-child{border:0}nav{position:fixed;bottom:0;left:0;right:0;z-index:8;background:#fffffff2;border-top:1px solid var(--line);display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}nav button{background:none;border-radius:0;min-width:70px;padding:12px 8px;color:var(--muted)}nav button.on{color:var(--green)}dialog{border:0;border-radius:25px;padding:0;width:min(620px,calc(100% - 20px));max-height:88vh;color:var(--ink)}dialog::backdrop{background:#10241e99}.modal{padding:22px;overflow:auto;max-height:88vh}.close{float:right;background:none;font-size:20px}.view{display:none}.view.on{display:block}.warning{background:#fff0e8;color:#8d3b20;padding:12px;border-radius:13px}.report{white-space:pre-wrap;line-height:1.65;background:#f5f8f5;padding:16px;border-radius:16px}@media(min-width:650px){.quick{grid-template-columns:repeat(4,1fr)}.quick button{text-align:center}}
</style></head><body><header><h1>🌿 오늘한입</h1><input id="day" class="date" type="date"></header><main>
<section id="home" class="view on"><div class="hero"><small>오늘의 기록</small><div class="big"><span id="heroWeight">—</span><small> kg</small></div><div class="grid"><div class="stat"><small>섭취</small><b id="heroKcal">0 kcal</b></div><div class="stat"><small>단백질</small><b id="heroProtein">0 g</b></div><div class="stat"><small>식사</small><b id="heroMeals">0회</b></div><div class="stat"><small>운동</small><b id="heroExercise">미기록</b></div></div></div><div class="quick"><button onclick="openModal('bodyDlg')"><b>⚖️</b>몸 기록</button><button onclick="openModal('mealDlg')"><b>🥗</b>식사</button><button onclick="openModal('exerciseDlg')"><b>🏃</b>운동</button><button onclick="openModal('conditionDlg')"><b>☀️</b>컨디션</button></div><div class="card"><div class="between row"><h2>오늘 섭취량</h2><span id="remain"></span></div><div id="macros"></div></div><div class="card"><h2>오늘 기록</h2><div id="todayList"></div></div><button class="primary full" onclick="summary()">오늘 요약 만들기</button><div id="summaryBox" class="card" hidden></div></section>
<section id="report" class="view"><div class="card"><h2>주간 리포트</h2><p class="muted">선택한 날짜까지 최근 7일을 정리합니다.</p><button class="primary" onclick="loadReport()">리포트 새로 만들기</button><button onclick="copyReport()">복사</button><div id="reportBox" class="report" style="margin-top:14px">기록을 쌓으면 이곳에 흐름이 보여요.</div></div></section>
<section id="settings" class="view"><div class="card"><h2>프로필과 목표</h2><div class="fields"><div><label>키 cm</label><input id="height" type="number"></div><div><label>나이</label><input id="age" type="number"></div><div><label>성별</label><select id="gender"><option value="남성">남성</option><option value="여성">여성</option></select></div><div><label>활동량</label><select id="activity"><option>낮음</option><option>보통</option><option>높음</option></select></div><div><label>시작 체중 kg</label><input id="start_weight" type="number" step=".1"></div><div><label>목표 체중 kg</label><input id="target_weight" type="number" step=".1"></div><div><label>목표 kcal</label><input id="calorie_target" type="number"></div><div><label>목표 단백질 g</label><input id="protein_target" type="number"></div><div><label>목표 탄수화물 g</label><input id="carb_target" type="number"></div><div><label>목표 지방 g</label><input id="fat_target" type="number"></div></div><div id="metabolism" class="muted" style="margin:12px 0"></div><div id="calWarn"></div><button class="primary full" onclick="saveProfile()">설정 저장</button></div><div class="card"><h2>자주 먹는 음식 추가</h2><div class="fields"><input id="fn" placeholder="음식명"><input id="fk" type="number" placeholder="kcal"><input id="fc" type="number" placeholder="탄수화물 g"><input id="fp" type="number" placeholder="단백질 g"><input id="ff" type="number" placeholder="지방 g"></div><button onclick="addFood()">추가</button><div id="foodManage"></div></div><div class="card"><h2>데이터</h2><p>사진 사용량 <b id="photoSize">0 MB</b></p><a class="btn" href="/api/export/json">JSON 백업</a> <a class="btn" href="/api/export/csv">CSV 내보내기</a><p class="muted">X/Twitter에는 자동 게시하지 않습니다. 요약을 복사해 직접 올려주세요.</p></div></section>
</main><nav><button class="on" onclick="show('home',this)">오늘</button><button onclick="show('report',this)">주간</button><button onclick="show('settings',this)">설정</button></nav>
<dialog id="bodyDlg"><div class="modal"><button class="close" onclick="this.closest('dialog').close()">×</button><h2>몸 기록</h2><label>몸무게 kg</label><input id="weight" type="number" step=".1" inputmode="decimal"><div class="row chips"><button onclick="step('weight',-.1)">−0.1</button><button onclick="step('weight',.1)">+0.1</button><button onclick="step('weight',.5)">+0.5</button></div><label>허리둘레 cm (선택)</label><input id="waist" type="number" step=".1"><button class="primary full" onclick="saveBody()">저장</button></div></dialog>
<dialog id="mealDlg"><div class="modal"><button class="close" onclick="this.closest('dialog').close()">×</button><h2>식사 기록</h2><label>식사</label><div id="mealKinds" class="chips"></div><label>자주 먹는 음식</label><select id="foodSelect" onchange="pickFood()"></select><label>음식명</label><input id="food_name"><div class="fields"><input id="kcal" type="number" placeholder="kcal"><input id="carbs" type="number" placeholder="탄수화물 g"><input id="protein" type="number" placeholder="단백질 g"><input id="fat" type="number" placeholder="지방 g"></div><div id="macroCheck" class="muted"></div><label>태그</label><div id="tagChips" class="chips"></div><label>메모</label><textarea id="mealMemo"></textarea><label>사진 (선택)</label><input id="mealPhoto" type="file" accept="image/*"><button class="primary full" onclick="saveMeal()">식사 저장</button></div></dialog>
<dialog id="exerciseDlg"><div class="modal"><button class="close" onclick="this.closest('dialog').close()">×</button><h2>운동 기록</h2><label>운동</label><select id="exerciseType" onchange="exerciseChanged()"></select><div id="repArea"><label>횟수</label><input id="reps" type="number" value="10"><div class="chips"><button onclick="step('reps',-10)">−10</button><button onclick="step('reps',-1)">−1</button><button onclick="step('reps',1)">+1</button><button onclick="step('reps',10)">+10</button></div><label>세트</label><div class="chips"><button onclick="setv('sets',1)">1세트</button><button onclick="setv('sets',2)">2세트</button><button onclick="setv('sets',3)">3세트</button></div><input id="sets" type="number" value="1"></div><div id="timeArea"><label>시간</label><div class="chips"><button onclick="setv('seconds',30)">30초</button><button onclick="setv('seconds',60)">1분</button><button onclick="setv('seconds',90)">1분30초</button><button onclick="setv('seconds',120)">2분</button></div><input id="seconds" type="number" value="0" placeholder="초"></div><div id="distanceArea"><label>거리 km</label><div class="chips"><button onclick="setv('distance',1)">1km</button><button onclick="setv('distance',3)">3km</button><button onclick="setv('distance',5)">5km</button></div><input id="distance" type="number" step=".1" value="0"></div><label>메모</label><input id="exerciseMemo"><button class="primary full" onclick="saveExercise()">운동 저장</button></div></dialog>
<dialog id="conditionDlg"><div class="modal"><button class="close" onclick="this.closest('dialog').close()">×</button><h2>컨디션</h2><div id="conditionFields"></div><label>메모</label><textarea id="conditionMemo"></textarea><button class="primary full" onclick="saveCondition()">저장</button></div></dialog>
<script src="app.js"></script></body></html>
